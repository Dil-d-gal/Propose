<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukhman ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#000,#ff0080,#7000ff,#000);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

.card{
width:90%;
max-width:400px;
padding:30px;
text-align:center;
border-radius:30px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
box-shadow:0 0 40px hotpink;
animation:glow 2s infinite alternate;
z-index:100;
}

@keyframes glow{
from{box-shadow:0 0 20px hotpink;}
to{box-shadow:0 0 60px deeppink;}
}

h1{
margin-bottom:15px;
font-size:30px;
}

p{
font-size:18px;
margin:10px;
}

button{
padding:12px 24px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#ff2e63;
color:white;
}

.no{
background:white;
color:black;
position:relative;
}

#loveMsg{
display:none;
font-size:24px;
margin-top:15px;
color:#ff77aa;
font-weight:bold;
text-shadow:0 0 10px pink;
}

.heart{
position:fixed;
font-size:25px;
pointer-events:none;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

#ring{
position:fixed;
font-size:90px;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(0);
animation:ringPop .8s forwards;
}

@keyframes ringPop{
to{
transform:translate(-50%,-50%) scale(1);
}
}

.fire{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
animation:blast 1s linear forwards;
}

@keyframes blast{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

</style>
</head>

<body>

<audio id="song">
<source src="song.mp3" type="audio/mp3">
</audio>

bt i can't ask directly to you...

YES ❤️

NO 😜

NAVI JI BANYI GAL ❤️❤️❤️ HOGI HAA ❤️

</div>

<script>

function moveNo(){

btn.style.top=Math.random()*80+"%";

function effects(){

document.body.appendChild(h);

for(let i=0;i<80;i++){

f.style.top="50%";

`hsl(${Math.random()*360},100%,50%)`;

"--x",
(Math.random()*600-300)+"px"

"--y",
(Math.random()*600-300)+"px"
);

document.body.appendChild(f);

setTimeout(()=>{

}

sound:'magic'

});

}

</script>

</body>
</html>
