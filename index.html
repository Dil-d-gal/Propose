<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#000,#ff0080,#6a00ff,#000);
background-size:400% 400%;
animation:bg 8s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
width:90%;
max-width:400px;
padding:30px;
border-radius:30px;
text-align:center;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
box-shadow:0 0 40px hotpink;
z-index:10;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.yes{
background:#ff2e63;
color:white;
}

.no{
background:white;
color:black;
position:relative;
}

#loveMsg{
display:none;
font-size:22px;
margin-top:15px;
color:pink;
font-weight:bold;
}

.heart{
position:fixed;
font-size:25px;
pointer-events:none;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>
